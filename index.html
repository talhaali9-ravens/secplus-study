"IDS/IPS logs","Firewall logs"],"answer":0},{"q":"An organization is looking to optimize its environment and reduce the number of patches necessary for operating systems. Which of the following will best help to achieve this objective?","options":["Microservices","Virtualization","Real-time operating system","Containers"],"answer":3},{"q":"Which of the following tasks is typically included in the BIA process?","options":["Estimating the recovery time of systems","Identifying the communication strategy","Evaluating the risk management plan","Establishing the backup and recovery procedures"],"answer":0},{"q":"Which of the following is a risk of conducting a vulnerability assessment?","options":["A disruption of business operations","Unauthorized access to the system","Reports of false positives","Finding security gaps in the system"],"answer":0},{"q":"Which of the following techniques would attract the attention of a malicious attacker in an insider threat scenario?","options":["Creating a false text file in /docs/salaries","Setting weak passwords in /etc/shadow","Scheduling vulnerable jobs in /etc/crontab","Adding a fake account to /etc/passwd"],"answer":0},{"q":"An organization maintains intellectual property that it wants to protect. Which of the following concepts would be most beneficial to add to the company\u2019s security awareness training program?","options":["Insider threat detection","Simulated threats","Phishing awareness","Business continuity planning"],"answer":0},{"q":"An organization plans to expand its operations internationally and needs to keep data at the new location secure. The organization wants to use the most secure architecture model possible. Which of the following models offers the highest level of security?","options":["Cloud-based","Peer-to-peer","On-premises","Hybrid"],"answer":2},{"q":"Which of the following is the most relevant reason a DPO would develop a data inventory?","options":["To manage data storage requirements better","To determine the impact in the event of a breach","To extend the length of time data can be retained","To automate the reduction of duplicated data"],"answer":1},{"q":"Which of the following cryptographic solutions protects data at rest?","options":["Digital signatures","Full disk encryption","Private key","Steganography"],"answer":1},{"q":"Which of the following should an organization use to protect its environment from external attacks conducted by an unauthorized hacker?","options":["ACL","IDS","HIDS","NIPS"],"answer":3},{"q":"Which of the following would enable a data center to remain operational through a multiday power outage?","options":["Generator","Uninterruptible power supply","Replication","Parallel processing"],"answer":0},{"q":"A company installed cameras and added signs to alert visitors that they are being recorded. Which of the following controls did the company implement? (Choose two.)","options":["Directive","Deterrent","Preventive","Detective"],"answer":1},{"q":"Which of the following is the best way to securely store an encryption key for a data set in a manner that allows multiple entities to access the key when needed?","options":["Public key infrastructure","Open public ledger","Public key encryption","Key escrow"],"answer":3},{"q":"For which of the following reasons would a systems administrator leverage a 3DES hash from an installer file that is posted on a vendor\u2019s website?","options":["To test the integrity of the file","To validate the authenticity of the file","To activate the license for the file","To calculate the checksum of the file"],"answer":0},{"q":"A company is redesigning its infrastructure and wants to reduce the number of physical servers in use. Which of the following architectures is best suited for this goal?","options":["Isolation","Segmentation","Virtualization","Redundancy"],"answer":2},{"q":"Which of the following security concepts is being followed when implementing a product that offers protection against DDoS attacks?","options":["Availability","Non-repudiation","Integrity","Confidentiality"],"answer":0},{"q":"A security manager created new documentation to use in response to various types of security incidents. Which of the following is the next step the manager should take?","options":["Set the maximum data retention policy.","Securely store the documents on an air-gapped network.","Review the documents\u2019 data classification policy.","Conduct a tabletop exercise with the team."],"answer":3},{"q":"After failing an audit twice, an organization has been ordered by a government regulatory agency to pay fines. Which of the following causes this action?","options":["Non-compliance","Contract violations","Government sanctions","Rules of engagement"],"answer":0},{"q":"A company is developing a critical system for the government and storing project information on a fileshare. Which of the following describes how this data will most likely be classified? (Choose two.)","options":["Private","Confidential","Public","Operational"],"answer":1},{"q":"Which of the following activities is included in the post-incident review phase?","options":["Determining the root cause of the incident","Developing steps to mitigate the risks of the incident","Validating the accuracy of the evidence collected during the investigation","Reestablishing the compromised system\u2019s configuration and settings"],"answer":0},{"q":"Which of the following attacks exploits a potential vulnerability as a result of using weak cryptographic algorithms?","options":["Password cracking","On-path","Digital signing","Side-channel"],"answer":0},{"q":"Which of the following is a preventive physical security control?","options":["Video surveillance system","Bollards","Alarm system","Motion sensors"],"answer":1},{"q":"Which of the following is most likely to be used as a just-in-time reference document within a security operations center?","options":["Change management policy","Risk profile","Playbook","SIEM profile"],"answer":2},{"q":"A security engineer configured a remote access VPN. The remote access VPN allows end users to connect to the network by using an agent that is installed on the endpoint, which establishes an encrypted tunnel. Which of the following protocols did the engineer most likely implement?","options":["GRE","IPSec","SD-WAN","EAP"],"answer":1},{"q":"Executives at a company are concerned about employees accessing systems and information about sensitive company projects unrelated to the employees\u2019 normal job duties. Which of the following enterprise security capabilities will the security team most likely deploy to detect that activity?","options":["UBA","EDR","NAC","DLP"],"answer":0},{"q":"Several customers want an organization to verify its security controls are operating effectively and have requested an independent opinion. Which of the following is the most efficient way to address these requests?","options":["Hire a vendor to perform a penetration test","Perform an annual self-assessment.","Allow each client the right to audit","Provide a third-party attestation report"],"answer":3},{"q":"A university employee logged on to the academic server and attempted to guess the system administrators\u2019 log-in credentials. Which of the following security measures should the university have implemented to detect the employee\u2019s attempts to gain access to the administrators\u2019 accounts?","options":["Two-factor authentication","Firewall","Intrusion prevention system","User activity logs"],"answer":3},{"q":"Which of the following consequences would a retail chain most likely face from customers in the event the retailer is non-compliant with PCI DSS?","options":["Contractual impacts","Sanctions","Fines","Reputational damage"],"answer":3},{"q":"A security analyst is reviewing logs and discovers the following: Which of the following should be used to best mitigate this type of attack?","options":["Input sanitization","Secure cookies","Static code analysis","Sandboxing"],"answer":0},{"q":"An administrator is installing an SSL certificate on a new system. During testing, errors indicate that the certificate is not trusted. The administrator has verified with the issuing CA and has validated the private key. Which of the following should the administrator check for next?","options":["If the wildcard certificate is configured","If the certificate signing request is valid","If the root certificate is installed","If the public key is configured"],"answer":2},{"q":"An employee emailed a new systems administrator a malicious web link and convinced the administrator to change the email server\u2019s password. The employee used this access to remove the mailboxes of key personnel. Which of the following security awareness concepts would help prevent this threat in the future?","options":["Recognizing phishing","Providing situational awareness training","Using password management","Reviewing email policies"],"answer":0},{"q":"Which of the following strategies should an organization use to efficiently manage and analyze multiple types of logs?","options":["Deploy a SIEM solution","Create custom scripts to aggregate and analyze logs.","Implement EDR technology.","Install a unified threat management appliance."],"answer":0},{"q":"A new security regulation was announced that will take effect in the coming year. A company must comply with it to remain in business. Which of the following activities should the company perform next?","options":["Gap analysis","Policy review","Security procedure evaluation","Threat scope reduction"],"answer":0},{"q":"An accountant is transferring information to a bank over FTP. Which of the following mitigations should the accountant use to protect the confidentiality of the data?","options":["Tokenization","Data masking","Encryption","Obfuscation"],"answer":2},{"q":"An organization has recently decided to implement SSO. The requirements are to leverage access tokens and focus on application authorization rather than user authentication. Which of the following solutions would the engineering team most likely configure?","options":["LDAP","Federation","SAML","OAuth"],"answer":3},{"q":"Which of the following would most likely be used by attackers to perform credential harvesting?","options":["Social engineering","Supply chain compromise","Third-party software","Rainbow table"],"answer":0},{"q":"A security engineer would like to enhance the use of automation and orchestration within the SIEM. Which of the following would be the primary benefit of this enhancement?","options":["It increases complexity.","It removes technical debt.","It adds additional guard rails.","It acts as a workforce multiplier."],"answer":3},{"q":"A systems administrator receives an alert that a company\u2019s internal file server is very slow and is only working intermittently. The systems administrator reviews the server management software and finds the following information about the server: Which of the following indicators most likely triggered this alert?","options":["Concurrent session usage","Network saturation","Account lockout","Resource consumption"],"answer":3},{"q":"Which of the following data states applies to data that is being actively processed by a database server?","options":["In use","At rest","In transit","Being hashed"],"answer":0},{"q":"Which of the following architectures is most suitable to provide redundancy for critical business processes?","options":["Network-enabled","Server-side","Cloud-native","Multitenant"],"answer":2},{"q":"After a security incident, a systems administrator asks the company to buy a NAC platform. Which of the following attack surfaces is the systems administrator trying to protect?","options":["Bluetooth","Wired","NFC","SCADA"],"answer":1},{"q":"While reviewing logs, a security administrator identifies the following code: Which of the following best describes the vulnerability being exploited?","options":["XSS","SQLi","DDoS","CSRF"],"answer":0},{"q":"An organization issued new laptops to all employees and wants to provide web filtering both in and out of the office without configuring additional access to the network. Which of the following types of web filtering should a systems administrator configure?","options":["Agent-based","Centralized proxy","URL scanning","Content categorization"],"answer":0},{"q":"Which of the following should be used to aggregate log data in order to create alerts and detect anomalous activity?","options":["SIEM","WAF","Network taps","IDS"],"answer":0},{"q":"Which of the following provides the best protection against unwanted or insecure communications to and from a device?","options":["System hardening","Host-based firewall","Intrusion detection system","Anti-malware software"],"answer":1},{"q":"Which of the following is the primary purpose of a service that tracks log-ins and time spent using the service?","options":["Availability","Accounting","Authentication","Authorization"],"answer":1},{"q":"An employee who was working remotely lost a mobile device containing company data. Which of the following provides the best solution to prevent future data loss?","options":["MDM","DLP","FDE","EDR"],"answer":0},{"q":"An IT administrator needs to ensure data retention standards are implemented on an enterprise application. Which of the following describes the administrator\u2019s role?","options":["Processor","Custodian","Privacy officer","Owner"],"answer":1},{"q":"A company plans to secure its systems by: \u2022 Preventing users from sending sensitive data over corporate email \u2022 Restricting access to potentially harmful websites Which of the following features should the company set up? (Choose two.)","options":["DLP software","DNS filtering","File integrity monitoring","Stateful firewall"],"answer":0},{"q":"A company processes and stores sensitive data on its own systems. Which of the following steps should the company take first to ensure compliance with privacy regulations?","options":["Implement access controls and encryption.","Develop and provide training on data protection policies.","Create incident response and disaster recovery plans.","Purchase and install security software."],"answer":1},{"q":"Which of the following cryptographic methods is preferred for securing communications with limited computing resources?","options":["Hashing algorithm","Public key infrastructure","Symmetric encryption","Elliptic curve cryptography"],"answer":2},{"q":"A network administrator wants to ensure that network traffic is highly secure while in transit. Which of the following actions best describes the actions the network administrator should take?","options":["Ensure that NAC is enforced on all network segments, and confirm that firewalls have updated policies to block unauthorized traffic.","Ensure only TLS and other encrypted protocols are selected for use on the network, and only permit authorized traffic via secure protocols.","Configure the perimeter IPS to block inbound HTTPS directory traversal traffic, and verify that signatures are updated on a daily basis.","Ensure the EDR software monitors for unauthorized applications that could be used by threat actors, and configure alerts for the security"],"answer":1},{"q":"Which of the following definitions best describes the concept of log correlation?","options":["Combining relevant logs from multiple sources into one location","Searching and processing data to identify patterns of malicious activity","Making a record of the events that occur in the system","Analyzing the log files of the system components"],"answer":1},{"q":"Which of the following is the best way to validate the integrity and availability of a disaster recovery site?","options":["Lead a simulated failover.","Conduct a tabletop exercise.","Periodically test the generators.","Develop requirements for database encryption."],"answer":0},{"q":"Which of the following allows an exploit to go undetected by the operating system?","options":["Firmware vulnerabilities","Side loading","Memory injection","Encrypted payloads"],"answer":2},{"q":"A malicious insider from the marketing team alters records and transfers company funds to a personal account. Which of the following methods would be the best way to secure company records in the future?","options":["Permission restrictions","Hashing","Input validation","Access control list"],"answer":0},{"q":"An organization is required to provide assurance that its controls are properly designed and operating effectively. Which of the following reports will best achieve the objective?","options":["Red teaming","Penetration testing","Independent audit","Vulnerability assessment"],"answer":2},{"q":"A systems administrator successfully configures VPN access to a cloud environment. Which of the following capabilities should the administrator use to best facilitate remote administration?","options":["A jump host in the shared services security zone","An SSH server within the corporate LAN","A reverse proxy on the firewall","An MDM solution with conditional access"],"answer":0},{"q":"Which of the following best describes the concept of information being stored outside of its country of origin while still being subject to the laws and requirements of the country of origin?","options":["Data sovereignty","Geolocation","Intellectual property","Geographic restrictions"],"answer":0},{"q":"An audit reveals that cardholder database logs are exposing account numbers inappropriately. Which of the following mechanisms would help limit the impact of this error?","options":["Segmentation","Hashing","Journaling","Masking"],"answer":3},{"q":"A security analyst attempts to start a company's database server. When the server starts, the analyst receives an error message indicating the database server did not pass authentication. After reviewing and testing the system, the analyst receives confirmation that the server has been compromised and that attackers have redirected all outgoing database traffic to a server under their control. Which of the following MITRE ATT&CK techniques did the attacker most likely use to redirect database traffic?","options":["Browser extension","Process injection","Valid accounts","Escape to host"],"answer":2},{"q":"A penetration tester enters an office building at the same time as a group of employees despite not having an access badge. Which of the following attack types is the penetration tester performing?","options":["Tailgating","Shoulder surfing","RFID cloning","Forgery"],"answer":0},{"q":"Which of the following enables the ability to receive a consolidated report from different devices on the network?","options":["IPS","DLP","SIEM","Firewall"],"answer":2},{"q":"Which of the following should an organization focus on the most when making decisions about vulnerability prioritization?","options":["Exposure factor","CVSS","CVE","Industry impact"],"answer":1},{"q":"An organization needs to monitor its users\u2019 activities in order to prevent insider threats. Which of the following solutions would help the organization achieve this goal?","options":["Behavioral analytics","Access control lists","Identity and access management","Network intrusion detection system"],"answer":0},{"q":"A customer of a large company receives a phone call from someone claiming to work for the company and asking for the customer\u2019s credit card information. The customer sees the caller ID is the same as the company's main phone number. Which of the following attacks is the customer most likely a target of?","options":["Phishing","Whaling","Smishing","Vishing"],"answer":3},{"q":"A security analyst is reviewing logs to identify the destination of command-and-control traffic originating from a compromised device within the on-premises network. Which of the following is the best log to review?","options":["IDS","Antivirus","Firewall","Application"],"answer":2},{"q":"When trying to access an internal website, an employee reports that a prompt displays, stating that the site is insecure. Which of the following certificate types is the site most likely using?","options":["Wildcard","Root of trust","Third-party","Self-signed"],"answer":3},{"q":"Which of the following would most likely be deployed to obtain and analyze attacker activity and techniques?","options":["Firewall","IDS","Honeypot","Layer 3 switch"],"answer":2},{"q":"Which of the following objectives is best achieved by a tabletop exercise?","options":["Familiarizing participants with the incident response process","Deciding red and blue team rules of engagement","Quickly determining the impact of an actual security breach","Conducting multiple security investigations in parallel"],"answer":0},{"q":"The private key for a website was stolen, and a new certificate has been issued. Which of the following needs to be updated next?","options":["SCEP","CRL","OCSP","CSR"],"answer":1},{"q":"Which of the following organizational documents is most often used to establish and communicate expectations associated with integrity and ethical behavior within an organization?","options":["AUP","SLA","EULA","MOA"],"answer":0},{"q":"Which of the following explains how to determine the global regulations that data is subject to regardless of the country where the data is stored?","options":["Geographic dispersion","Data sovereignty","Geographic restrictions","Data segmentation"],"answer":1},{"q":"An organization's web servers host an online ordering system. The organization discovers that the servers are vulnerable to a malicious JavaScript injection, which could allow attackers to access customer payment information. Which of the following mitigation strategies would be most effective for preventing an attack on the organization's web servers? (Choose two.)","options":["Regularly updating server software and patches","Implementing strong password policies","Encrypting sensitive data at rest and in transit","Utilizing a web-application firewall"],"answer":0},{"q":"Which of the following tools is best for logging and monitoring in a cloud environment?","options":["IPS","FIM","NAC","SIEM"],"answer":3},{"q":"During a SQL update of a database, a temporary field that was created was replaced by an attacker in order to allow access to the system. Which of the following best describes this type of vulnerability?","options":["Race condition","Memory injection","Malicious update","Side loading"],"answer":2},{"q":"A group of developers has a shared backup account to access the source code repository. Which of the following is best way to secure the backup account if there is an SSO failure?","options":["RAS","EAP","SAML","PAM"],"answer":3},{"q":"Which of the following elements of digital forensics should a company use if it needs to ensure the integrity of evidence?","options":["Preservation","E-discovery","Acquisition","Containment"],"answer":0},{"q":"A company suffered a critical incident where 30GB of data was exfiltrated from the corporate network. Which of the following actions is the most efficient way to identify where the system data was exfiltrated from and what location the attacker sent the data to?","options":["Analyze firewall and network logs for large amounts of outbound traffic to external IP addresses or domains.","Analyze IPS and IDS logs to find the IP addresses used by the attacker for reconnaissance scans.","Analyze endpoint and application logs to see whether file-sharing programs were running on the company systems.","Analyze external vulnerability scans and automated reports to identify the systems the attacker could have exploited a remote code"],"answer":0},{"q":"Which of the following describes the procedures a penetration tester must follow while conducting a test?","options":["Rules of engagement","Rules of acceptance","Rules of understanding","Rules of execution"],"answer":0},{"q":"A security analyst wants to better understand the behavior of users and devices in order to gain visibility into potential malicious activities. The analyst needs a control to detect when actions deviate from a common baseline. Which of the following should the analyst use?","options":["Intrusion prevention system","Sandbox","Endpoint detection and response","Antivirus"],"answer":2},{"q":"A legal department must maintain a backup from all devices that have been shredded and recycled by a third party. Which of the following best describes this requirement?","options":["Data retention","Certification","Sanitization","Destruction"],"answer":0},{"q":"Which of the following can be used to compromise a system that is running an RTOS?","options":["Cross-site scripting","Memory injection","Replay attack","Ransomware"],"answer":1},{"q":"Which of the following threat actors would most likely deface the website of a high-profile music group?","options":["Unskilled attacker","Organized crime","Nation-state","Insider threat"],"answer":0},{"q":"A security architect wants to prevent employees from receiving malicious attachments by email. Which of the following functions should the chosen solution do?","options":["Apply IP address reputation data.","Tap and monitor the email feed.","Scan email traffic inline.","Check SPF records."],"answer":2},{"q":"Which of the following activities is the first stage in the incident response process?","options":["Detection","Declaration","Containment","Verification"],"answer":0},{"q":"Which of the following is the main consideration when a legacy system that is a critical part of a company's infrastructure cannot be replaced?","options":["Resource provisioning","Cost","Single point of failure","Complexity"],"answer":2},{"q":"Which of the following is a compensating control for providing user access to a high-risk website?","options":["Enabling threat prevention features on the firewall","Configuring a SIEM tool to capture all web traffic","Setting firewall rules to allow traffic from any port to that destination","Blocking that website on the endpoint protection software"],"answer":0},{"q":"An organization is implementing a COPE mobile device management policy. Which of the following should the organization include in the COPE policy? (Choose two.)","options":["Remote wiping of the device","Data encryption","Requiring passwords with eight characters","Data usage caps"],"answer":0},{"q":"A security administrator observed the following in a web server log while investigating an incident: \"GET ../../../../etc/passwd\" Which of the following attacks did the security administrator most likely see?","options":["Privilege escalation","Credential replay","Brute force","Directory traversal"],"answer":3},{"q":"An organization wants a third-party vendor to do a penetration test that targets a specific device. The organization has provided basic information about the device. Which of the following best describes this kind of penetration test?","options":["Partially known environment","Unknown environment","Integrated","Known environment"],"answer":0},{"q":"Which of the following should a security team do first before a new web server goes live?","options":["Harden the virtual host.","Create WAF rules.","Enable network intrusion detection.","Apply patch management."],"answer":0},{"q":"Which of the following techniques can be used to sanitize the data contained on a hard drive while allowing for the hard drive to be repurposed?","options":["Degaussing","Drive shredder","Retention platform","Wipe tool"],"answer":3},{"q":"An attacker submits a request containing unexpected characters in an attempt to gain unauthorized access to information within the underlying systems. Which of the following best describes this attack?","options":["Side loading","Target of evaluation","Resource reuse","SQL injection"],"answer":3},{"q":"A security analyst has determined that a security breach would have a financial impact of $15,000 and is expected to occur twice within a threeyear period. Which of the following is the ALE for this risk?","options":["$7,500","$10,000","$15,000","$30,000"],"answer":1},{"q":"A systems administrator discovers a system that is no longer receiving support from the vendor. However, this system and its environment are critical to running the business, cannot be modified, and must stay online. Which of the following risk treatments is the most appropriate in this situation?","options":["Reject","Accept","Transfer","Avoid"],"answer":1},{"q":"A company discovered its data was advertised for sale on the dark web. During the initial investigation, the company determined the data was proprietary data. Which of the following is the next step the company should take?","options":["Identify the attacker\u2019s entry methods.","Report the breach to the local authorities.","Notify the applicable parties of the breach.","Implement vulnerability scanning of the company's systems."],"answer":2},{"q":"Which of the following would be the best solution to deploy a low-cost standby site that includes hardware and internet access?","options":["Recovery site","Cold site","Hot site","Warm site"],"answer":3},{"q":"An organization needs to determine how many employees are accessing the building each day in order to configure the proper access controls. Which of the following control types best meets this requirement?","options":["Detective","Preventive","Corrective","Directive"],"answer":0},{"q":"An organization wants to implement a secure solution for remote users. The users handle sensitive PHI on a regular basis and need to access an internally developed corporate application. Which of the following best meet the organization's security requirements? (Choose two.)","options":["Local administrative password","Perimeter network","Jump server","WAF"],"answer":4},{"q":"A security consultant is working with a client that wants to physically isolate its secure systems. Which of the following best describes this architecture?","options":["SDN","Air gapped","Containerized","Highly available"],"answer":1},{"q":"A company is in the process of migrating to cloud-based services. The company\u2019s IT department has limited resources for migration and ongoing support. Which of the following best meets the company\u2019s needs?","options":["IPS","WAF","SASE","IAM"],"answer":2},{"q":"Which of the following types of vulnerabilities is primarily caused by improper use and management of cryptographic certificates?","options":["Misconfiguration","Resource reuse","Insecure key storage","Weak cipher suites"],"answer":0},{"q":"Which of the following best describe the benefits of a microservices architecture when compared to a monolithic architecture? (Choose two.)","options":["Easier debugging of the system","Reduced cost of ownership of the system","Improved scalability of the system","Increased compartmentalization of the system"],"answer":2},{"q":"A user's workstation becomes unresponsive and displays a ransom note demanding payment to decrypt files. Before the attack, the user opened a resume they received in a message, browsed the company's website, and installed OS updates. Which of the following is the most likely vector of this attack?","options":["Spear-phishing attachment","Watering hole","Infected website","Typosquatting"],"answer":0},{"q":"A penetration tester finds an unused Ethernet port during an on-site penetration test. Upon plugging a device into the unused port, the penetration tester notices that the machine is assigned an IP address, allowing the tester to enumerate the local network. Which of the following should an administrator implement in order to prevent this situation from happening in the future?","options":["Port security","Transport Layer Security","Proxy server","Security zones"],"answer":0},{"q":"A security administrator documented the following records during an assessment of network services: Two weeks later, the administrator performed a log review and noticed the records were changed as follows: When consulting the service owner, the administrator validated that the new address was not part of the company network. Which of the following was the company most likely experiencing?","options":["DDoS attack","DNS poisoning","Ransomware compromise","Spyware infection"],"answer":1},{"q":"Which of the following is the primary reason why false negatives on a vulnerability scan should be a concern?","options":["The system has vulnerabilities that are not being detected.","The time to remediate vulnerabilities that do not exist is excessive.","Vulnerabilities with a lower severity will be prioritized over critical vulnerabilities.","The system has vulnerabilities, and a patch has not yet been released."],"answer":0},{"q":"A company is concerned about theft of client data from decommissioned laptops. Which of the following is the most cost-effective method to decrease this risk?","options":["Wiping","Recycling","Shredding","Deletion"],"answer":0},{"q":"A company that has a large IT operation is looking to better control, standardize, and lower the time required to build new servers. Which of the following architectures will best achieve the company\u2019s objectives?","options":["IoT","IaC","IaaS","ICS"],"answer":1},{"q":"A government official receives a blank envelope containing photos and a note instructing the official to wire a large sum of money by midnight to prevent the photos from being leaked on the internet. Which of the following best describes the threat actor's intent?","options":["Organized crime","Philosophical beliefs","Espionage","Blackmail"],"answer":3},{"q":"Which of the following is the best security reason for closing service ports that are not needed?","options":["To mitigate risks associated with unencrypted traffic","To eliminate false positives from a vulnerability scan","To reduce a system's attack surface","To improve a system's resource utilization"],"answer":2},{"q":"Which of the following would a security administrator use to comply with a secure baseline during a patch update?","options":["Information security policy","Service-level expectations","Standard operating procedure","Test result report"],"answer":2},{"q":"A malicious actor conducted a brute-force attack on a company's web servers and eventually gained access to the company's customer information database. Which of the following is the most effective way to prevent similar attacks?","options":["Regular patching of servers","Web application firewalls","Multifactor authentication","Enabling encryption of customer data"],"answer":2},{"q":"Which of the following options will provide the lowest RTO and RPO for a database?","options":["Snapshots","On-site backups","Journaling","Hot site"],"answer":3},{"q":"Which of the following is a possible consequence of a VM escape?","options":["Malicious instructions can be inserted into memory and give the attacker elevated permissions.","An attacker can access the hypervisor and compromise other VMs.","Unencrypted data can be read by a user who is in a separate environment.","Users can install software that is not on the manufacturer\u2019s approved list."],"answer":1},{"q":"A security team at a large, global company needs to reduce the cost of storing data used for performing investigations. Which of the following types of data should have its retention length reduced?","options":["Packet capture","Endpoint logs","OS security logs","Vulnerability scan"],"answer":0},{"q":"Which of the following is a type of vulnerability that involves inserting scripts into web-based applications in order to take control of the client's web browser?","options":["SQL injection","Cross-site scripting","Zero-day exploit","On-path attack"],"answer":1},{"q":"While investigating a possible incident, a security analyst discovers the following: Which of the following should the analyst do first?","options":["Implement a WAF.","Disable the query.php script.","Block brute-force attempts on temporary users.","Check the users table for new accounts."],"answer":3},{"q":"Due to a cyberattack, a company's IT systems were not operational for an extended period of time. The company wants to measure how quickly the systems must be restored in order to minimize business disruption. Which of the following would the company most likely use?","options":["Recovery point objective","Risk appetite","Risk tolerance","Recovery time objective"],"answer":3},{"q":"Which of the following actors attacking an organization is the most likely to be motivated by personal beliefs?","options":["Nation-state","Organized crime","Hacktivist","Insider threat"],"answer":2},{"q":"Which of the following should a security team use to document persistent vulnerabilities with related recommendations?","options":["Audit report","Risk register","Compliance report","Penetration test"],"answer":1},{"q":"An organization purchased a critical business application containing sensitive data. The organization would like to ensure that the application is not exploited by common data exfiltration attacks. Which of the following approaches would best help to fulfill this requirement?","options":["URL scanning","WAF","Reverse proxy","NAC"],"answer":1},{"q":"A company wants to improve the availability of its application with a solution that requires minimal effort in the event a server needs to be replaced or added. Which of the following would be the best solution to meet these objectives?","options":["Load balancing","Fault tolerance","Proxy servers","Replication"],"answer":0},{"q":"A company is performing a risk assessment on new software the company plans to use. Which of the following should the company assess during this process?","options":["Software vulnerabilities","Cost-benefit analysis","Ongoing monitoring strategies","Network infrastructure compatibility"],"answer":0},{"q":"A malicious actor is trying to access sensitive financial information from a company's database by intercepting and reusing log-in credentials. Which of the following attacks is the malicious actor attempting?","options":["SQL injection","On-path","Brute-force","Password spraying"],"answer":1},{"q":"A new employee accessed an unauthorized website. An investigation found that the employee violated the company's rules. Which of the following did the employee violate?","options":["MOU","AUP","NDA","MOA"],"answer":1},{"q":"A systems administrator is reviewing the VPN logs and notices that during non-working hours a user is accessing the company file server and information is being transferred to a suspicious IP address. Which of the following threats is most likely occurring?","options":["Typosquatting","Root or trust","Data exfiltration","Blackmail"],"answer":2},{"q":"A company discovers suspicious transactions that were entered into the company's database and attached to a user account that was created as a trap for malicious activity. Which of the following is the user account an example of?","options":["Honeytoken","Honeynet","Honeypot","Honeyfile"],"answer":0},{"q":"A network engineer is increasing the overall security of network devices and needs to harden the devices. Which of the following will best accomplish this task?","options":["Configuring centralized logging","Generating local administrator accounts","Replacing Telnet with SSH","Enabling HTTP administration"],"answer":2},{"q":"A company's accounting department receives an urgent payment message from the company's bank domain with instructions to wire transfer funds. The sender requests that the transfer be completed as soon as possible. Which of the following attacks is described?","options":["Business email compromise","Vishing","Spear phishing","Impersonation"],"answer":0},{"q":"A company filed a complaint with its IT service provider after the company discovered the service provider's external audit team had access to some of the company's confidential information. Which of the following is the most likely reason the company filed the complaint?","options":["The MOU had basic clauses from a template.","A SOW had not been agreed to by the client.","A WO had not been mutually approved.","A required NDA had not been signed."],"answer":3},{"q":"Which of the following aspects of the data management life cycle is most directly impacted by local and international regulations?","options":["Destruction","Certification","Retention","Sanitization"],"answer":2},{"q":"An analyst is reviewing job postings to ensure sensitive company information is not being shared with the general public. Which of the following is the analyst most likely looking for?","options":["Office addresses","Software versions","List of board members","Government identification numbers"],"answer":1},{"q":"An engineer has ensured that the switches are using the latest OS, the servers have the latest patches, and the endpoints' definitions are up to date. Which of the following will these actions most effectively prevent?","options":["Zero-day attacks","Insider threats","End-of-life support","Known exploits"],"answer":3},{"q":"Which of the following is most likely a security concern when installing and using low-cost IoT devices in infrastructure environments?","options":["Country of origin","Device responsiveness","Ease of deployment","Storage of data"],"answer":3},{"q":"A company captures log-in details and reviews them each week to identify conditions such as excessive log-in attempts and frequent lockouts. Which of the following should a security analyst recommend to improve security compliance monitoring?","options":["Including the date and person who reviewed the information in a report","Adding automated alerting when anomalies occur","Requiring a statement each week that no exceptions were noted","Masking the username in a report to protect privacy"],"answer":1},{"q":"A security team is in the process of hardening the network against externally crafted malicious packets. Which of the following is the most secure method to protect the internal network?","options":["Anti-malware solutions","Host-based firewalls","Intrusion prevention systems","Network access control"],"answer":2},{"q":"Which of the following is the best way to prevent an unauthorized user from plugging a laptop into an employee's phone network port and then using tools to scan for database servers?","options":["MAC filtering","Segmentation","Certification","Isolation"],"answer":0},{"q":"Which of the following should a systems administrator use to decrease the company's hardware attack surface?","options":["Replication","Isolation","Centralization","Virtualization"],"answer":3},{"q":"A company wants to add an MFA solution for all employees who access the corporate network remotely. Log-in requirements include something you know, are, and have. The company wants a solution that does not require purchasing third-party applications or specialized hardware. Which of the following MFA solutions would best meet the company's requirements?","options":["Smart card with PIN and password","Security questions and a one-time passcode sent via email","Voice and fingerprint verification with an SMS one-time passcode","Mobile application-generated, one-time passcode with facial recognition"],"answer":2},{"q":"A company is using a legacy FTP server to transfer financial data to a third party. The legacy system does not support SFTP, so a compensating control is needed to protect the sensitive, financial data in transit. Which of the following would be the most appropriate for the company to use?","options":["Telnet connection","SSH tunneling","Patch installation","Full disk encryption"],"answer":1},{"q":"A security manager wants to reduce the number of steps required to identify and contain basic threats. Which of the following will help achieve this goal?","options":["SOAR","SIEM","DMARC","NIDS"],"answer":0},{"q":"The Chief Information Officer (CIO) asked a vendor to provide documentation detailing the specific objectives within the compliance framework that the vendor's services meet. The vendor provided a report and a signed letter stating that the services meet 17 of the 21 objectives. Which of the following did the vendor provide to the CIO?","options":["Penetration test results","Self-assessment findings","Attestation of compliance","Third-party audit report"],"answer":2},{"q":"Which of the following describes the most effective way to address OS vulnerabilities after they are identified?","options":["Endpoint protection","Removal of unnecessary software","Configuration enforcement","Patching"],"answer":3},{"q":"The management team reports that employees are missing features on company-provided tablets, which is causing productivity issues. The management team directs the IT team to resolve the issue within 48 hours. Which of the following would be the best solution for the IT team to leverage in this scenario?","options":["EDR","COPE","MDM","FDE"],"answer":2},{"q":"A company is implementing a policy to allow employees to use their personal equipment for work. However, the company wants to ensure that only company-approved applications can be installed. Which of the following addresses this concern?","options":["MDM","Containerization","DLP","FIM"],"answer":0},{"q":"An alert references attacks associated with a zero-day exploit. An analyst places a bastion host in the network to reduce the risk of the exploit. Which of the following types of controls is the analyst implementing?","options":["Compensating","Detective","Operational","Physical"],"answer":0},{"q":"A penetration test has demonstrated that domain administrator accounts were vulnerable to pass-the-hash attacks. Which of the following would have been the best strategy to prevent the threat actor from using domain administrator accounts?","options":["Audit each domain administrator account weekly for password compliance.","Implement a privileged access management solution.","Create IDS policies to monitor domain controller access.","Use Group Policy to enforce password expiration."],"answer":1},{"q":"A security administrator is implementing encryption on all hard drives in an organization. Which of the following security concepts is the administrator applying?","options":["Integrity","Authentication","Zero Trust","Confidentiality"],"answer":3},{"q":"An administrator has configured a quarantine subnet for all guest devices that connect to the network. Which of the following would be best for the security team to perform before allowing access to corporate resources?","options":["Device fingerprinting","Compliance attestation","Penetration test","Application vulnerability test"],"answer":1},{"q":"A customer has a contract with a CSP and wants to identify which controls should be implemented in the IaaS enclave. Which of the following is most likely to contain this information?","options":["Statement of work","Responsibility matrix","Service-level agreement","Master service agreement"],"answer":1},{"q":"A Chief Information Security Officer is developing procedures to guide detective and corrective activities associated with common threats, including phishing, social engineering, and business email compromise. Which of the following documents would be most relevant to revise as part of this process?","options":["SDLC","IRP","BCP","AUP"],"answer":1},{"q":"Which of the following testing techniques uses both defensive and offensive testing methodologies with developers to securely build key applications and software?","options":["Blue","Yellow","Red","Green"],"answer":1},{"q":"An administrator wants to automate an account permissions update for a large number of accounts. Which of the following would best accomplish this task?","options":["Security groups","Federation","User provisioning","Vertical scaling"],"answer":2},{"q":"Which of the following is the fastest and most cost-effective way to confirm a third-party supplier's compliance with security obligations?","options":["Attestation report","Third-party audit","Vulnerability assessment","Penetration testing"],"answer":0},{"q":"Various company stakeholders meet to discuss roles and responsibilities in the event of a security breach that would affect offshore offices. Which of the following is this an example of?","options":["Tabletop exercise","Penetration test","Geographic dispersion","Incident response"],"answer":0},{"q":"Which of the following is an example of a data protection strategy that uses tokenization?","options":["Encrypting databases containing sensitive data","Replacing sensitive data with surrogate values","Removing sensitive data from production systems","Hashing sensitive data in critical systems"],"answer":1},{"q":"Which of the following is a type of vulnerability that refers to the unauthorized installation of applications on a device through means other than the official application store?","options":["Cross-site scripting","Buffer overflow","Jailbreaking","Side loading"],"answer":3},{"q":"Which of the following types of identification methods can be performed on a deployed application during runtime?","options":["Dynamic analysis","Code review","Package monitoring","Bug bounty"],"answer":0},{"q":"Which of the following cryptographic solutions is used to hide the fact that communication is occurring?","options":["Steganography","Data masking","Tokenization","Private key"],"answer":0},{"q":"Which of the following steps should be taken before mitigating a vulnerability in a production server?","options":["Escalate the issue to the SDLC team.","Use the IR plan to evaluate the changes.","Perform a risk assessment to classify the vulnerability.","Refer to the change management policy."],"answer":3},{"q":"A security engineer needs to quickly identify a signature from a known malicious file. Which of the following analysis methods would the security engineer most likely use?","options":["Static","Sandbox","Network traffic","Package monitoring"],"answer":0},{"q":"Which of the following should a company use to provide proof of external network security testing?","options":["Business impact analysis","Supply chain analysis","Vulnerability assessment","Third-party attestation"],"answer":3},{"q":"A security administrator is addressing an issue with a legacy system that communicates data using an unencrypted protocol to transfer sensitive data to a third party. No software updates that use an encrypted protocol are available, so a compensating control is needed. Which of the following are the most appropriate for the administrator to suggest? (Choose two.)","options":["Tokenization","Cryptographic downgrade","SSH tunneling","Segmentation"],"answer":2},{"q":"Which of the following steps in the risk management process involves establishing the scope and potential risks involved with a project?","options":["Risk assessment","Risk identification","Risk treatment","Risk monitoring and review"],"answer":1},{"q":"A company's website is www.company.com. Attackers purchased the domain www.c0mpany.com. Which of the following types of attacks describes this example?","options":["Typosquatting","Brand impersonation","On-path","Watering-hole"],"answer":0},{"q":"Which of the following allows a systems administrator to tune permissions for a file?","options":["Patching","Access control list","Configuration enforcement","Least privilege"],"answer":1},{"q":"Which of the following would be the greatest concern for a company that is aware of the consequences of non-compliance with government regulations?","options":["Right to be forgotten","Sanctions","External compliance reporting","Attestation"],"answer":1},{"q":"Which of the following security concepts is accomplished when granting access after an individual has logged into a computer network?","options":["Authorization","Identification","Non-repudiation","Authentication"],"answer":0},{"q":"A growing organization, which hosts an externally accessible application, adds multiple virtual servers to improve application performance and decrease the resource usage on individual servers. Which of the following solutions is the organization most likely to employ to further increase performance and availability?","options":["Load balancer","Jump server","Proxy server","SD-WAN"],"answer":0},{"q":"A systems administrator is concerned users are accessing emails through a duplicate site that is not run by the company. Which of the following is used in this scenario?","options":["Impersonation","Replication","Phishing","Smishing"],"answer":2},{"q":"A company wants to ensure employees are allowed to copy files from a virtual desktop during the workday but are restricted during non-working hours. Which of the following security measures should the company set up?","options":["Digital rights management","Role-based access control","Time-based access control","Network access control"],"answer":2},{"q":"A company\u2019s gate access logs show multiple entries from an employee\u2019s ID badge within a two-minute period. Which of the following is this an example of?","options":["RFID cloning","Side-channel attack","Shoulder surfing","Tailgating"],"answer":0},{"q":"Which of the following most accurately describes the order in which a security engineer should implement secure baselines?","options":["Deploy, maintain, establish","Establish, maintain, deploy","Establish, deploy, maintain","Deploy, establish, maintain"],"answer":2},{"q":"A SOC analyst establishes a remote control session on an end user\u2019s machine and discovers the following in a file: gmail.com[ENT]my.name@gmail.com[ENT]NoOneCanGuessThis123! [ENT]Hello Susan, it was great to see you the other day! Let\u2019s plan a followup[BACKSPACE]follow-up meeting soon. Here is the link to register. [RTN][CTRL]c [CTRL]v [RTN]after[BACKSPACE]After you register give me a call on my cellphone. Which of the following actions should the SOC analyst perform first?","options":["Advise the user to change passwords.","Reimage the end user\u2019s machine.","Check the policy on personal email at work.","Check host firewall logs."],"answer":0},{"q":"A Chief Information Security Officer (CISO) wants to: \u2022 Prevent employees from downloading malicious content. \u2022 Establish controls based on departments and users. \u2022 Map internet access for business applications to specific service accounts. \u2022 Restrict content based on categorization. Which of the following should the CSO implement?","options":["Web application firewall","Secure DNS server","Jump server","Next-generation firewall"],"answer":3},{"q":"A company is aware of a given security risk related to a specific market segment. The business chooses not to accept responsibility and target their services to a different market segment. Which of the following describes this risk management strategy?","options":["Exemption","Exception","Avoid","Transfer"],"answer":2},{"q":"A security analyst needs to improve the company\u2019s authentication policy following a password audit. Which of the following should be included in the policy? (Choose two.)","options":["Length","Complexity","Least privilege","Something you have"],"answer":0}];
