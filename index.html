 content of recurring training.","Implement a phishing campaign."],"answer":2},{"q":"A newly appointed board member with cybersecurity knowledge wants the board of directors to receive a quarterly report detailing the number of incidents that impacted the organization. The systems administrator is creating a way to present the data to the board of directors. Which of the following should the systems administrator use?","options":["Packet captures","Vulnerability scans","Metadata","Dashboard"],"answer":3},{"q":"A systems administrator receives the following alert from a file integrity monitoring tool: The hash of the cmd.exe file has changed. The systems administrator checks the OS logs and notices that no patches were applied in the last two months. Which of the following most likely occurred?","options":["The end user changed the file permissions.","A cryptographic collision was detected.","A snapshot of the file system was taken.","A rootkit was deployed."],"answer":3},{"q":"Which of the following roles, according to the shared responsibility model, is responsible for securing the company\u2019s database in an IaaS model for a cloud environment?","options":["Client","Third-party vendor","Cloud provider","DBA"],"answer":0},{"q":"A client asked a security company to provide a document outlining the project, the cost, and the completion time frame. Which of the following documents should the company provide to the client?","options":["MSA","SLA","BPA","SOW"],"answer":3},{"q":"A security team is reviewing the findings in a report that was delivered after a third party performed a penetration test. One of the findings indicated that a web application form field is vulnerable to cross-site scripting. Which of the following application security techniques should the security analyst recommend the developer implement to prevent this vulnerability?","options":["Secure cookies","Version control","Input validation","Code signing"],"answer":2},{"q":"Which of the following must be considered when designing a high-availability network? (Choose two).","options":["Ease of recovery","Ability to patch","Physical isolation","Responsiveness"],"answer":0},{"q":"A technician needs to apply a high-priority patch to a production system. Which of the following steps should be taken first?","options":["Air gap the system.","Move the system to a different network segment.","Create a change control request.","Apply the patch to the system."],"answer":2},{"q":"Which of the following describes the reason root cause analysis should be conducted as part of incident response?","options":["To gather IoCs for the investigation","To discover which systems have been affected","To eradicate any trace of malware on the network","To prevent future incidents of the same nature"],"answer":3},{"q":"Which of the following is the most likely outcome if a large bank fails an internal PCI DSS compliance assessment?","options":["Fines","Audit findings","Sanctions","Reputation damage"],"answer":1},{"q":"A company is developing a business continuity strategy and needs to determine how many staff members would be required to sustain the business in the case of a disruption. Which of the following best describes this step?","options":["Capacity planning","Redundancy","Geographic dispersion","Tabletop exercise"],"answer":0},{"q":"A company\u2019s legal department drafted sensitive documents in a SaaS application and wants to ensure the documents cannot be accessed by individuals in high-risk countries. Which of the following is the most effective way to limit this access?","options":["Data masking","Encryption","Geolocation policy","Data sovereignty regulation"],"answer":2},{"q":"Which of the following is a hardware-specific vulnerability?","options":["Firmware version","Buffer overflow","SQL injection","Cross-site scripting"],"answer":0},{"q":"While troubleshooting a firewall configuration, a technician determines that a \u201cdeny any\u201d policy should be added to the bottom of the ACL. The technician updates the policy, but the new policy causes several company servers to become unreachable. Which of the following actions would prevent this issue?","options":["Documenting the new policy in a change request and submitting the request to change management","Testing the policy in a non-production environment before enabling the policy in the production network","Disabling any intrusion prevention signatures on the \u201cdeny any\u201d policy prior to enabling the new policy","Including an \u201callow any\u201d policy above the \u201cdeny any\u201d policy"],"answer":1},{"q":"An organization is building a new backup data center with cost-benefit as the primary requirement and RTO and RPO values around two days. Which of the following types of sites is the best for this scenario?","options":["Real-time recovery","Hot","Cold","Warm"],"answer":3},{"q":"A company requires hard drives to be securely wiped before sending decommissioned systems to recycling. Which of the following best describes this policy?","options":["Enumeration","Sanitization","Destruction","Inventory"],"answer":1},{"q":"A systems administrator works for a local hospital and needs to ensure patient data is protected and secure. Which of the following data classifications should be used to secure patient data?","options":["Private","Critical","Sensitive","Public"],"answer":2},{"q":"A U.S.-based cloud-hosting provider wants to expand its data centers to new international locations. Which of the following should the hosting provider consider first?","options":["Local data protection regulations","Risks from hackers residing in other countries","Impacts to existing contractual obligations","Time zone differences in log correlation"],"answer":0},{"q":"Which of the following would be the best way to block unknown programs from executing?","options":["Access control list","Application allow list","Host-based firewall","DLP solution"],"answer":1},{"q":"A company hired a consultant to perform an offensive security assessment covering penetration testing and social engineering. Which of the following teams will conduct this assessment activity?","options":["White","Purple","Blue","Red"],"answer":3},{"q":"A software development manager wants to ensure the authenticity of the code created by the company. Which of the following options is the most appropriate?","options":["Testing input validation on the user input fields","Performing code signing on company-developed software","Performing static code analysis on the software","Ensuring secure cookies are use"],"answer":1},{"q":"Which of the following can be used to identify potential attacker activities without affecting production servers?","options":["Honeypot","Video surveillance","Zero Trust","Geofencing"],"answer":0},{"q":"During an investigation, an incident response team attempts to understand the source of an incident. Which of the following incident response activities describes this process?","options":["Analysis","Lessons learned","Detection","Containment"],"answer":0},{"q":"A security practitioner completes a vulnerability assessment on a company\u2019s network and finds several vulnerabilities, which the operations team remediates. Which of the following should be done next?","options":["Conduct an audit.","Initiate a penetration test.","Rescan the network.","Submit a report."],"answer":2},{"q":"An administrator was notified that a user logged in remotely after hours and copied large amounts of data to a personal device. Which of the following best describes the user\u2019s activity?","options":["Penetration testing","Phishing campaign","External audit","Insider threat"],"answer":3},{"q":"Which of the following allows for the attribution of messages to individuals?","options":["Adaptive identity","Non-repudiation","Authentication","Access logs"],"answer":1},{"q":"Which of the following is the best way to consistently determine on a daily basis whether security settings on servers have been modified?","options":["Automation","Compliance checklist","Attestation","Manual audit"],"answer":0},{"q":"Which of the following tools can assist with detecting an employee who has accidentally emailed a file containing a customer\u2019s PII?","options":["SCAP","NetFlow","Antivirus","DLP"],"answer":3},{"q":"An organization recently updated its security policy to include the following statement: Regular expressions are included in source code to remove special characters such as $, |, ;. &, `, and ? from variables set by forms in a web application. Which of the following best explains the security technique the organization adopted by making this addition to the policy?","options":["Identify embedded keys","Code debugging","Input validation","Static code analysis"],"answer":2},{"q":"A security analyst and the management team are reviewing the organizational performance of a recent phishing campaign. The user click-through rate exceeded the acceptable risk threshold, and the management team wants to reduce the impact when a user clicks on a link in a phishing message. Which of the following should the analyst do?","options":["Place posters around the office to raise awareness of common phishing activities.","Implement email security filters to prevent phishing emails from being delivered.","Update the EDR policies to block automatic execution of downloaded programs.","Create additional training for users to recognize the signs of phishing attempts."],"answer":2},{"q":"Which of the following has been implemented when a host-based firewall on a legacy Linux system allows connections from only specific internal IP addresses?","options":["Compensating control","Network segmentation","Transfer of risk","SNMP traps"],"answer":0},{"q":"The management team notices that new accounts that are set up manually do not always have correct access or permissions. Which of the following automation techniques should a systems administrator use to streamline account creation?"," ommend?","options":["Changing the remote desktop port to a non-standard number","Setting up a VPN and placing the jump server inside the firewall","Using a proxy for web connections from the remote desktop server","Connecting the remote server to the domain and increasing the password length"],"answer":1},{"q":"An enterprise has been experiencing attacks focused on exploiting vulnerabilities in older browser versions with well-known exploits. Which of the following security solutions should be configured to best provide the ability to monitor and block these known signature-based attacks?","options":["ACL","DLP","IDS","IPS"],"answer":3},{"q":"Security controls in a data center are being reviewed to ensure data is properly protected and that human life considerations are included. Which of the following best describes how the controls should be set up?","options":["Remote access points should fail closed.","Logging controls should fail open.","Safety controls should fail open.","Logical security controls should fail closed."],"answer":2},{"q":"Which of the following would be best suited for constantly changing environments?","options":["RTOS","Containers","Embedded systems","SCADA"],"answer":1},{"q":"Which of the following incident response activities ensures evidence is properly handled?","options":["E-discovery","Chain of custody","Legal hold","Preservation"],"answer":1},{"q":"An accounting clerk sent money to an attacker's bank account after receiving fraudulent instructions to use a new account. Which of the following would most likely prevent this activity in the future?","options":["Standardizing security incident reporting","Executing regular phishing campaigns","Implementing insider threat detection measures","Updating processes for sending wire transfers"],"answer":3},{"q":"A systems administrator is creating a script that would save time and prevent human error when performing account creation for a large number of end users. Which of the following would be a good use case for this task?","options":["Off-the-shelf software","Orchestration","Baseline","Policy enforcement"],"answer":1},{"q":"A company's marketing department collects, modifies, and stores sensitive customer data. The infrastructure team is responsible for securing the data while in transit and at rest. Which of the following data roles describes the customer?","options":["Processor","Custodian","Subject","Owner"],"answer":2},{"q":"Which of the following describes the maximum allowance of accepted risk?","options":["Risk indicator","Risk level","Risk score","Risk threshold"],"answer":3},{"q":"A security analyst receives alerts about an internal system sending a large amount of unusual DNS queries to systems on the internet over short periods of time during non-business hours. Which of the following is most likely occurring?","options":["A worm is propagating across the network.","Data is being exfiltrated.","A logic bomb is deleting data.","Ransomware is encrypting files."],"answer":1},{"q":"A technician is opening ports on a firewall for a new system being deployed and supported by a SaaS provider. Which of the following is a risk in the new system?","options":["Default credentials","Non-segmented network","Supply chain vendor","Vulnerable software"],"answer":2},{"q":"A systems administrator is working on a solution with the following requirements: \u2022 Provide a secure zone. \u2022 Enforce a company-wide access control policy. \u2022 Reduce the scope of threats. Which of the following is the systems administrator setting up?","options":["Zero Trust","AAA","Non-repudiation","CIA"],"answer":0},{"q":"Which of the following involves an attempt to take advantage of database misconfigurations?","options":["Buffer overflow","SQL injection","VM escape","Memory injection"],"answer":1},{"q":"Which of the following is used to validate a certificate when it is presented to a user?","options":["OCSP","CSR","CA","CRC"],"answer":0},{"q":"One of a company's vendors sent an analyst a security bulletin that recommends a BIOS update. Which of the following vulnerability types is being addressed by the patch?","options":["Virtualization","Firmware","Application","Operating system"],"answer":1},{"q":"Which of the following is used to quantitatively measure the criticality of a vulnerability?","options":["CVE","CVSS","CIA","CERT"],"answer":1},{"q":"Which of the following actions could a security engineer take to ensure workstations and servers are properly monitored for unauthorized changes and software?","options":["Configure all systems to log scheduled tasks.","Collect and monitor all traffic exiting the network.","Block traffic based on known malicious signatures.","Install endpoint management software on all systems"],"answer":3},{"q":"An organization is leveraging a VPN between its headquarters and a branch location. Which of the following is the VPN protecting?","options":["Data in use","Data in transit","Geographic restrictions","Data sovereignty"],"answer":1},{"q":"After reviewing the following vulnerability scanning report: A security analyst performs the following test: Which of the following would the security analyst conclude for this reported vulnerability?","options":["It is a false positive.","A rescan is required.","It is considered noise.","Compensating controls exist."],"answer":0},{"q":"An organization disabled unneeded services and placed a firewall in front of a business-critical legacy system. Which of the following best describes the actions taken by the organization?","options":["Exception","Segmentation","Risk transfer","Compensating controls"],"answer":3},{"q":"A security consultant needs secure, remote access to a client environment. Which of the following should the security consultant most likely use to gain access?","options":["EAP","DHCP","IPSec","NAT"],"answer":2},{"q":"Which of the following should a systems administrator use to ensure an easy deployment of resources within the cloud provider?","opti rganization's critical systems?","options":["Red","Blue","Purple","Yellow"],"answer":2},{"q":"A small business uses kiosks on the sales floor to display product information for customers. A security team discovers the kiosks use end-of-life operating systems. Which of the following is the security team most likely to document as a security implication of the current architecture?","options":["Patch availability","Product software compatibility","Ease of recovery","Cost of replacement"],"answer":0},{"q":"Which of the following would help ensure a security analyst is able to accurately measure the overall risk to an organization when a new vulnerability is disclosed?","options":["A full inventory of all hardware and software","Documentation of system classifications","A list of system owners and their departments","Third-party risk assessment documentation"],"answer":0},{"q":"Which of the following best practices gives administrators a set period to perform changes to an operational system to ensure availability and minimize business impacts?","options":["Impact analysis","Scheduled downtime","Backout plan","Change management boards"],"answer":1},{"q":"A company must ensure sensitive data at rest is rendered unreadable. Which of the following will the company most likely use?","options":["Hashing","Tokenization","Encryption","Segmentation"],"answer":2},{"q":"A legacy device is being decommissioned and is no longer receiving updates or patches. Which of the following describes this scenario?","options":["End of business","End of testing","End of support","End of life"],"answer":3},{"q":"A bank insists all of its vendors must prevent data loss on stolen laptops. Which of the following strategies is the bank requiring?","options":["Encryption at rest","Masking","Data classification","Permission restrictions"],"answer":0},{"q":"A company's end users are reporting that they are unable to reach external websites. After reviewing the performance data for the DNS severs, the humbprint","Company URL, TLS certificate, home address"],"answer":2},{"q":"Which of the following would be the best way to handle a critical business application that is running on a legacy server?","options":["Segmentation","Isolation","Hardening","Decommissioning"],"answer":0},{"q":"Which of the following vulnerabilities is exploited when an attacker overwrites a register with a malicious address?","options":["VM escape","SQL injection","Buffer overflow","Race condition"],"answer":2},{"q":"After a company was compromised, customers initiated a lawsuit. The company's attorneys have requested that the security team initiate a legal hold in response to the lawsuit. Which of the following describes the action the security team will most likely be required to take?","options":["Retain the emails between the security team and affected customers for 30 days.","Retain any communications related to the security breach until further notice.","Retain any communications between security members during the breach response.","Retain all emails from the company to affected customers for an indefinite period of time."],"answer":1},{"q":"Which of the following describes the process of concealing code or text inside a graphical image?","options":["Symmetric encryption","Hashing","Data masking","Steganography"],"answer":3},{"q":"An employee receives a text message from an unknown number claiming to be the company\u2019s Chief Executive Officer and asking the employee to purchase several gift cards. Which of the following types of attacks does this describe?","options":["Vishing","Smishing","Pretexting","Phishing"],"answer":1},{"q":"Which of the following risk management strategies should an enterprise adopt first if a legacy application is critical to business operations and there are preventative controls that are not yet implemented?","options":["Mitigate","Accept","Transfer","Avoid"],"answer":0},{"q":"Visitors to a secured facility are required to check in with a photo ID and enter the facility through an access control vestibule. Which of the following best describes this form of security control?","options":["Physical","Managerial","Technical","Operational"],"answer":0},{"q":"The local administrator account for a company's VPN appliance was unexpectedly used to log in to the remote management interface. Which of the following would have most likely prevented this from happening?","options":["Using least privilege","Changing the default password","Assigning individual user IDs","Reviewing logs more frequently"],"answer":1},{"q":"Which of the following is the best way to secure an on-site data center against intrusion from an insider?","options":["Bollards","Access badge","Motion sensor","Video surveillance"],"answer":1},{"q":"An engineer moved to another team and is unable to access the new team's shared folders while still being able to access the shared folders from the former team. After opening a ticket, the engineer discovers that the account was never moved to the new group. Which of the following access controls is most likely causing the lack of access?","options":["Role-based","Discretionary","Time of day","Least privilege"],"answer":0},{"q":"Which of the following factors are the most important to address when formulating a training curriculum plan for a security awareness program? (Choose two.)","options":["Channels by which the organization communicates with customers","The reporting mechanisms for ethics violations","Threat vectors based on the industry in which the organization operates","Secure software development training for all personnel"],"answer":2},{"q":"A network administrator is working on a project to deploy a load balancer in the company's cloud environment. Which of the following fundamental security requirements does this project fulfil?","options":["Privacy","Integrity","Confidentiality","Availability"],"answer":3},{"q":"A systems administrator is changing the password policy within an enterprise environment and wants this update implemented on all systems as quickly as possible. Which of the following operating system security measures will the administrator most likely use?","options":["Deploying PowerShell scripts","Pushing GPO update","Enabling PAP","Updating EDR profiles"],"answer":1},{"q":"Which of the following would be most useful in determining whether the long-term cost to transfer a risk is less than the impact of the risk?","options":["ARO","RTO","RPO","ALE"],"answer":3},{"q":"In order to strengthen a password and prevent a hacker from cracking it, a random string of 36 characters was added to the password. Which of the following best describes this technique?","options":["Key stretching","Tokenization","Data masking","Salting"],"answer":3},{"q":"A technician is deploying a new security camera. Which of the following should the technician do?","options":["Configure the correct VLAN.","Perform a vulnerability scan.","Disable unnecessary ports.","Conduct a site survey."],"answer":3},{"q":"A company is experiencing a web services outage on the public network. The services are up and available but inaccessible. The network logs show a sudden increase in network traffic that is causing the outage. Which of the following attacks is the organization experiencing?","options":["ARP poisoning","Brute force","Buffer overflow","DDoS"],"answer":3},{"q":"Which of the following threat actors is the most likely to be motivated by profit?","options":["Hacktivist","Insider threat","Organized crime","Shadow IT"],"answer":2},{"q":"An organization experiences a cybersecurity incident involving a command-and-control server. Which of the following logs should be analyzed to identify the impacted host? (Choose two.)","options":["Application","Authentication","DHCP","Network"],"answer":3},{"q":"During a penetration test, a vendor attempts to enter an unauthorized area using an access badge. Which of the following types of tests does this represent?","options":["Defensive","Passive","Offensive","Physical"],"answer":3},{"q":"A systems administrator uses a key to encrypt a message being sent to a peer in a different branch office. The peer then uses the same key to decrypt the message. Which of the following describes this example?","options":["Symmetric","Asymmetric","Hashing","Salting"],"answer":0},{"q":"A visitor plugs a laptop into a network jack in the lobby and is able to connect to the company's network. Which of the following should be configured on the existing network infrastructure to best prevent this activity?","options":["Port security","Web application firewall","Transport layer security","Virtual private network"],"answer":0},{"q":"A security administrator is reissuing a former employee's laptop. Which of the following is the best combination of data handling activities for the administrator to perform? (Choose two.)","options":["Data retention","Certification","Destruction","Classification"],"answer":1},{"q":"A systems administrator would like to deploy a change to a production system. Which of the following must the administrator submit to demonstrate that the system can be restored to a working state in the event of a performance issue?","options":["Backout plan","Impact analysis","Test procedure","Approval procedure"],"answer":0},{"q":"A company is redesigning its infrastructure and wants to reduce the number of physical servers in use. Which of the following architectures is best suited for this goal?","options":["Serverless","Segmentation","Virtualization","Microservices"],"answer":2},{"q":"A bank set up a new server that contains customers' PII. Which of the following should the bank use to make sure the sensitive data is not modified?","options":["Full disk encryption","Network access control","File integrity monitoring","User behavior analytics"],"answer":2},{"q":"Users at a company are reporting they are unable to access the URL for a new retail website because it is flagged as gambling and is being blocked. Which of the following changes would allow users to access the site?","options":["Creating a firewall rule to allow HTTPS traffic","Configuring the IPS to allow shopping","Tuning the DLP rule that detects credit card data","Updating the categorization in the content filter"],"answer":3},{"q":"Which of the following most impacts an administrator's ability to address CVEs discovered on a server?","options":["Rescanning requirements","Patch availability","Organizational impact","Risk tolerance"],"answer":1},{"q":"Which of the following describes effective change management procedures?","options":["Approving the change after a successful deployment","Having a backout plan when a patch fails","Using a spreadsheet for tracking changes","Using an automatic change control bypass for security updates"],"answer":1},{"q":"The CIRT is reviewing an incident that involved a human resources recruiter exfiltrating sensitive company data. The CIRT found that the recruiter was able to use HTTP over port 53 to upload documents to a web server. Which of the following security infrastructure devices could have identified and blocked this activity?","options":["WAF utilizing SSL decryption","NGFW utilizing application inspection","UTM utilizing a threat feed","SD-WAN utilizing IPSec"],"answer":1},{"q":"An enterprise is working with a third party and needs to allow access between the internal networks of both parties for a secure file migration. The solution needs to ensure encryption is applied to all traffic that is traversing the networks. Which of the following solutions should most likely be implemented?","options":["EAP","IPSec","SD-WAN","TLS"],"answer":1},{"q":"An administrator has identified and fingerprinted specific files that will generate an alert if an attempt is made to email these files outside of the organization. Which of the following best describes the tool the administrator is using?","options":["DLP","SNMP traps","SCAP","IPS"],"answer":0},{"q":"A software developer released a new application and is distributing application files via the developer's website. Which of the following should the developer post on the website to allow users to verify the integrity of the downloaded files?","options":["Hashes","Certificates","Algorithms","Salting"],"answer":0},{"q":"An organization wants to limit potential impact to its log-in database in the event of a breach. Which of the following options is the security team most likely to recommend?","options":["Tokenization","Hashing","Obfuscation","Segmentation"],"answer":1},{"q":"An administrator finds that all user workstations and servers are displaying a message that is associated with files containing an extension of .ryk. Which of the following types of infections is present on the systems?","options":["Virus","Trojan","Spyware","Ransomware"],"answer":3},{"q":"A systems administrator is advised that an external web server is not functioning property. The administrator reviews the following firewall logs containing traffic going to the web server: Which of the following attacks is likely occurring?","options":["DDoS","Directory traversal","Brute-force","HTTPS downgrade"],"answer":0},{"q":"An organization would like to calculate the time needed to resolve a hardware issue with a server. Which of the following risk management processes describes this example?","options":["Recovery point objective","Mean time between failures","Recovery time objective","Mean time to repair"],"answer":3},{"q":"A security engineer is installing an IPS to block signature-based attacks in the environment. Which of the following modes will best accomplish this task?","options":["Monitor","Sensor","Audit","Active"],"answer":3},{"q":"An IT manager is increasing the security capabilities of an organization after a data classification initiative determined that sensitive data could be exfiltrated from the environment. Which of the following solutions would mitigate the risk?","options":["XDR","SPF","DLP","DMARC"],"answer":2},{"q":"Which of the following is used to protect a computer from viruses, malware, and Trojans being installed and moving laterally across the network?","options":["IDS","ACL","EDR","NAC"],"answer":2},{"q":"Client files can only be accessed by employees who need to know the information and have specified roles in the company. Which of the following best describes this security concept?","options":["Availability","Confidentiality","Integrity","Non-repudiation"],"answer":1},{"q":"Which of the following describes the category of data that is most impacted when it is lost?","options":["Confidential","Public","Private","Critical"],"answer":3},{"q":"A new employee logs in to the email system for the first time and notices a message from human resources about onboarding. The employee hovers over a few of the links within the email and discovers that the links do not correspond to links associated with the company. Which of the following attack vectors is most likely being used?","options":["Business email","Social engineering","Unsecured network","Default credentials"],"answer":1},{"q":"Which of the following describes the understanding between a company and a client about what will be provided and the accepted time needed to provide the company with the resources?","options":["SLA","MOU","MOA","BPA"],"answer":0},{"q":"A company that is located in an area prone to hurricanes is developing a disaster recovery plan and looking at site considerations that allow the company to immediately continue operations. Which of the following is the best type of site for this company?","options":["Cold","Tertiary","Warm","Hot"],"answer":3},{"q":"Which of the following security controls is most likely being used when a critical legacy server is segmented into a private network?","options":["Deterrent","Corrective","Compensating","Preventive"],"answer":2},{"q":"Which of the following best describes the practice of researching laws and regulations related to information security operations within a specific industry?","options":["Compliance reporting","GDPR","Due diligence","Attestation"],"answer":2},{"q":"Which of the following considerations is the most important for an organization to evaluate as it establishes and maintains a data privacy program?","options":["Reporting structure for the data privacy officer","Request process for data subject access","Role as controller or processor","Physical location of the company"],"answer":2},{"q":"A security analyst is investigating a workstation that is suspected of outbound communication to a command-and-control server. During the investigation, the analyst discovered that logs on the endpoint were deleted. Which of the following logs would the analyst most likely look at next?","options":["IPS","Firewall","A\u0421L","Windows security"],"answer":1},{"q":"An IT manager is putting together a documented plan describing how the organization will keep operating in the event of a global incident. Which of the following plans is the IT manager creating?","options":["Business continuity","Physical security","Change management","Disaster recovery"],"answer":0},{"q":"A business needs a recovery site but does not require immediate failover. The business also wants to reduce the workload required to recover from an outage. Which of the following recovery sites is the best option?","options":["Hot","Cold","Warm","Geographically dispersed"],"answer":2},{"q":"A security team is setting up a new environment for hosting the organization's on-premises software application as a cloud-based service. Which of the following should the team ensure is in place in order for the organization to follow security best practices?","options":["Virtualization and isolation of resources","Network segmentation","Data encryption","Strong authentication policies"],"answer":0},{"q":"A manager receives an email that contains a link to receive a refund. After hovering over the link, the manager notices that the domain's URL points to a suspicious link. Which of the following security practices helped the manager to identify the attack?","options":["End user training","Policy review","URL scanning","Plain text email"],"answer":0},{"q":"A company wants to verify that the software the company is deploying came from the vendor the company purchased the software from. Which of the following is the best way for the company to confirm this information?","options":["Validate the code signature.","Execute the code in a sandbox.","Search the executable for ASCII strings.","Generate a hash of the files."],"answer":0},{"q":"A systems administrator notices that one of the systems critical for processing customer transactions is running an end-of-life operating system. Which of the following techniques would increase enterprise security?","options":["Installing HIDS on the system","Placing the system in an isolated VLAN","Decommissioning the system","Encrypting the system's hard drive"],"answer":1},{"q":"The Chief Information Security Officer (CISO) at a large company would like to gain an understanding of how the company's security policies compare to the requirements imposed by external regulators. Which of the following should the CISO use?","options":["Penetration test","Internal audit","Attestation","External examination"],"answer":1},{"q":"A systems administrator notices that the research and development department is not using the company VPN when accessing various companyrelated services and systems. Which of the following scenarios describes this activity?","options":["Espionage","Data exfiltration","Nation-state attack","Shadow IT"],"answer":3},{"q":"The marketing department set up its own project management software without telling the appropriate departments. Which of the following describes this scenario?","options":["Shadow IT","Insider threat","Data exfiltration","Service disruption"],"answer":0},{"q":"Which of the following would best explain why a security analyst is running daily vulnerability scans on all corporate endpoints?","options":["To track the status of patching installations","To find shadow IT cloud deployments","To continuously the monitor hardware inventory","To hunt for active attackers in the network"],"answer":0},{"q":"Which of the following is classified as high availability in a cloud environment?","options":["Access broker","Cloud HSM","WAF","Load balancer"],"answer":3},{"q":"Which of the following security measures is required when using a cloud-based platform for IoT management?","options":["Encrypted connection","Federated identity","Firewall","Single sign-on"],"answer":0},{"q":"Which of the following threat vectors is most commonly utilized by insider threat actors attempting data exfiltration?","options":["Unidentified removable devices","Default network device credentials","Spear phishing emails","Impersonation of business units through typosquatting"],"answer":0},{"q":"Which of the following methods to secure credit card data is best to use when a requirement is to see only the last four numbers on a credit card?","options":["Encryption","Hashing","Masking","Tokenization"],"answer":2},{"q":"The Chief Information Security Officer (CISO) has determined the company is non-compliant with local data privacy regulations. The CISO needs to justify the budget request for more resources. Which of the following should the CISO present to the board as the direct consequence of noncompliance?","options":["Fines","Reputational damage","Sanctions","Contractual implications"],"answer":0},{"q":"Which of the following alert types is the most likely to be ignored over time?","options":["True positive","True negative","False positive","False negative"],"answer":2},{"q":"A security analyst is investigating an application server and discovers that software on the server is behaving abnormally. The software normally runs batch jobs locally and does not generate traffic, but the process is now generating outbound traffic over random high ports. Which of the following vulnerabilities has likely been exploited in this software?","options":["Memory injection","Race condition","Side loading","SQL injection"],"answer":0},{"q":"An important patch for a critical application has just been released, and a systems administrator is identifying all of the systems requiring the patch. Which of the following must be maintained in order to ensure that all systems requiring the patch are updated?","options":["Asset inventory","Network enumeration","Data certification","Procurement process"],"answer":0},{"q":"Which of the following should a security operations center use to improve its incident response procedure?","options":["Playbooks","Frameworks","Baselines","Benchmarks"],"answer":0},{"q":"Which of the following describes an executive team that is meeting in a board room and testing the company's incident response plan?","options":["Continuity of operations","Capacity planning","Tabletop exercise","Parallel processing"],"answer":2},{"q":"A healthcare organization wants to provide a web application that allows individuals to digitally report health emergencies. Which of the following is the most important consideration during development?","options":["Scalability","Availability","Cost","Ease of deployment"],"answer":1},{"q":"Which of the following agreement types defines the time frame in which a vendor needs to respond?","options":["SOW","SLA","MOA","MOU"],"answer":1},{"q":"Which of the following is a feature of a next-generation SIEM system?","options":["Virus signatures","Automated response actions","Security agent deployment","Vulnerability scanning"],"answer":1},{"q":"To improve the security at a data center, a security administrator implements a CCTV system and posts several signs about the possibility of being filmed. Which of the following best describe these types of controls? (Choose two.)","options":["Preventive","Deterrent","Corrective","Directive"],"answer":1},{"q":"Which of the following examples would be best mitigated by input sanitization?","options":["B. nmap - 10.11.1.130","Email message: \"Click this link to get your free gift card.\"","Browser message: \"Your connection is not private.\""],"answer":0},{"q":"An attacker posing as the Chief Executive Officer calls an employee and instructs the employee to buy gift cards. Which of the following techniques is the attacker using?","options":["Smishing","Disinformation","Impersonating","Whaling"],"answer":2},{"q":"After conducting a vulnerability scan, a systems administrator notices that one of the identified vulnerabilities is not present on the systems that were scanned. Which of the following describes this example?","options":["False positive","False negative","True positive","True negative"],"answer":0},{"q":"A recent penetration test identified that an attacker could flood the MAC address table of network switches. Which of the following would best mitigate this type of attack?","options":["Load balancer","Port security","IPS","NGFW"],"answer":1},{"q":"A user would like to install software and features that are not available with a smartphone's default software. Which of the following would allow the user to install unauthorized software and enable new features?","options":["SQLi","Cross-site scripting","Jailbreaking","Side loading"],"answer":2},{"q":"Which of the following phases of an incident response involves generating reports?","options":["Recovery","Preparation","Lessons learned","Containment"],"answer":2},{"q":"Which of the following methods would most likely be used to identify legacy systems?","options":["Bug bounty program","Vulnerability scan","Package monitoring","Dynamic analysis"],"answer":1},{"q":"A company allows customers to upload PDF documents to its public e-commerce website. Which of the following would a security analyst most likely recommend?","options":["Utilizing attack signatures in an IDS","Enabling malware detection through a UTM","Limiting the affected servers with a load balancer","Blocking command injections via a WAF"],"answer":1},{"q":"A security analyst developed a script to automate a trivial and repeatable task. Which of the following best describes the benefits of ensuring other team members understand how the script works?","options":["To reduce implementation cost","To identify complexity","To remediate technical debt","To prevent a single point of failure"],"answer":3},{"q":"A company is decommissioning its physical servers and replacing them with an architecture that will reduce the number of individual operating systems. Which of the following strategies should the company use to achieve this security requirement?","options":["Microservices","Containerization","Virtualization","Infrastructure as code"],"answer":1},{"q":"An administrator needs to perform server hardening before deployment. Which of the following steps should the administrator take? (Choose two.)","options":["Disable default accounts.","Add the server to the asset inventory.","Remove unnecessary services.","Document default passwords."],"answer":0},{"q":"A Chief Information Security Officer would like to conduct frequent, detailed reviews of systems and procedures to track compliance objectives. Which of the following will be the best method to achieve this objective?","options":["Third-party attestation","Penetration testing","Internal auditing","Vulnerability scans"],"answer":2},{"q":"Which of the following security concepts is accomplished with the installation of a RADIUS server?","options":["CIA","AAA","ACL","PEM"],"answer":1},{"q":"After creating a contract for IT contractors, the human resources department changed several clauses. The contract has gone through three revisions. Which of the following processes should the human resources department follow to track revisions?","options":["Version validation","Version changes","Version updates","Version control"],"answer":3},{"q":"The executive management team is mandating the company develop a disaster recovery plan. The cost must be kept to a minimum, and the money to fund additional internet connections is not available. Which of the following would be the best option?","options":["Hot site","Cold site","Failover site","Warm site"],"answer":1},{"q":"Which of the following teams is best suited to determine whether a company has systems that can be exploited by a potential, identified vulnerability?","options":["Purple team","Blue team","Red team","White team"],"answer":1},{"q":"A company is reviewing options to enforce user logins after several account takeovers. The following conditions must be met as part of the solution: \u2022 Allow employees to work remotely or from assigned offices around the world. \u2022 Provide a seamless login experience. \u2022 Limit the amount of equipment required. Which of the following best meets these conditions?","options":["Trusted devices","Geotagging","Smart cards","Time-based logins"],"answer":0},{"q":"A company wants to ensure that the software it develops will not be tampered with after the final version is completed. Which of the following should the company most likely use?","options":["Hashing","Encryption","Baselines","Tokenization"],"answer":0},{"q":"An organization completed a project to deploy SSO across all business applications last year. Recently, the finance department selected a new cloud-based accounting software vendor. Which of the following should most likely be configured during the new software deployment?","options":["RADIUS","SAML","EAP","OpenID"],"answer":1},{"q":"A user, who is waiting for a flight at an airport, logs in to the airline website using the public Wi-Fi, ignores a security warning and purchases an upgraded seat. When the flight lands, the user finds unauthorized credit card charges. Which of the following attacks most likely occurred?","options":["Replay attack","Memory leak","Buffer overflow attack","On-path attack"],"answer":3},{"q":"A network engineer deployed a redundant switch stack to increase system availability. However, the budget can only cover the cost of one ISP connection. Which of the following best describes the potential risk factor?","options":["The equipment MTBF is unknown.","The ISP has no SLA.","An RPO has not been determined.","There is a single point of failure."],"answer":3},{"q":"A network team segmented a critical, end-of-life server to a VLAN that can only be reached by specific devices but cannot be reached by the perimeter network. Which of the following best describe the controls the team implemented? (Choose two.)","options":["Managerial","Physical","Corrective","Detective"],"answer":4},{"q":"A threat actor was able to use a username and password to log in to a stolen company mobile device. Which of the following provides the best solution to increase mobile data security on all employees' company mobile devices?","options":["Application management","Full disk encryption","Remote wipe","Containerization"],"answer":2},{"q":"Which of the following best describes the risk present after controls and mitigating factors have been applied?","options":["Residual","Avoided","Inherent","Operational"],"answer":0},{"q":"A software development team asked a security administrator to recommend techniques that should be used to reduce the chances of the software being reverse engineered. Which of the following should the security administrator recommend?","options":["Digitally signing the software","Performing code obfuscation","Limiting the use of third-party libraries","Using compile flags"],"answer":1},{"q":"Which of the following is a possible factor for MFA?","options":["Something you exhibit","Something you have","Somewhere you are","Someone you know"],"answer":1},{"q":"Easy-to-guess passwords led to an account compromise. The current password policy requires at least 12 alphanumeric characters, one uppercase character, one lowercase character, a password history of two passwords, a minimum password age of one day, and a maximum password age of 90 days. Which of the following would reduce the risk of this incident from happening again? (Choose two.)","options":["Increasing the minimum password length to 14 characters.","Upgrading the password hashing algorithm from MD5 to SHA-512.","Increasing the maximum password age to 120 days.","Reducing the minimum password length to ten characters."],"answer":0},{"q":"A user downloaded software from an online forum. After the user installed the software, the security team observed external network traffic connecting to the user's computer on an uncommon port. Which of the following is the most likely explanation of this unauthorized connection?","options":["The software had a hidden keylogger.","The software was ransomware.","The user's computer had a fileless virus.","The software contained a backdoor."],"answer":3},{"q":"A utility company is designing a new platform that will host all the virtual machines used by business applications. The requirements include: \u2022 A starting baseline of 50% memory utilization \u2022 Storage scalability \u2022 Single circuit failure resilience Which of the following best meets all of these requirements?","options":["Connecting dual PDUs to redundant power supplies","Transitioning the platform to an IaaS provider","Configuring network load balancing for multiple paths","Deploying multiple large NAS devices for each host"],"answer":1},{"q":"Which of the following best describes a use case for a DNS sinkhole?","options":["Attackers can see a DNS sinkhole as a highly valuable resource to identify a company's domain structure.","A DNS sinkhole can be used to draw employees away from known-good websites to malicious ones owned by the attacker.","A DNS sinkhole can be used to capture traffic to known-malicious domains used by attackers.","A DNS sinkhole can be set up to attract potential attackers away from a company's network resources."],"answer":2},{"q":"An incident analyst finds several image files on a hard disk. The image files may contain geolocation coordinates. Which of the following best describes the type of information the analyst is trying to extract from the image files?","options":["Log data","Metadata","Encrypted data","Sensitive data"],"answer":1},{"q":"Which of the following most likely describes why a security engineer would configure all outbound emails to use S/MIME digital signatures?","options":["To meet compliance standards","To increase delivery rates","To block phishing attacks","To ensure non-repudiation"],"answer":3},{"q":"During a recent company safety stand-down, the cyber-awareness team gave a presentation on the importance of cyber hygiene. One topic the team covered was best practices for printing centers. Which of the following describes an attack method that relates to printing centers?","options":["Whaling","Credential harvesting","Prepending","Dumpster diving"],"answer":3},{"q":"Which of the following considerations is the most important regarding cryptography used in an IoT device?","options":["Resource constraints","Available bandwidth","The use of block ciphers","The compatibility of the TLS version"],"answer":0},{"q":"A coffee shop owner wants to restrict internet access to only paying customers by prompting them for a receipt number. Which of the following is the best method to use given this requirement?","options":["WPA3","Captive portal","PSK","IEEE 802.1X"],"answer":1},{"q":"While performing digital forensics, which of the following is considered the most volatile and should have the contents collected first?","options":["Hard drive","RAM","SSD","Temporary files"],"answer":1},{"q":"A hosting provider needs to prove that its security controls have been in place over the last six months and have sufficiently protected customer data. Which of the following would provide the best proof that the hosting provider has met the requirements?","options":["NIST CSF","SOC 2 Type 2 report","CIS Top 20 compliance reports","Vulnerability report"],"answer":1},{"q":"A city municipality lost its primary data center when a tornado hit the facility. Which of the following should the city staff use immediately after the disaster to handle essential public services?","options":["BCP","Communication plan","DRP","IRP"],"answer":2},{"q":"Which of the following is considered a preventive control?","options":["Configuration auditing","Log correlation","Incident alerts","Segregation of duties"],"answer":3},{"q":"A systems administrator notices that a testing system is down. While investigating, the systems administrator finds that the servers are online and accessible from any device on the server network. The administrator reviews the following information from the monitoring system: Which of the following is the most likely cause of the outage?","options":["Denial of service","ARP poisoning","Jamming","Kerberoasting"],"answer":0},{"q":"A security team has been alerted to a flood of incoming emails that have various subject lines and are addressed to multiple email inboxes. Each email contains a URL shortener link that is redirecting to a dead domain. Which of the following is the best step for the security team to take?","options":["Create a blocklist for all subject lines.","Send the dead domain to a DNS sinkhole.","Quarantine all emails received and notify all employees.","Block the URL shortener domain in the web proxy."],"answer":1},{"q":"A security administrator is working to secure company data on corporate laptops in case the laptops are stolen. Which of the following solutions should the administrator consider?","options":["Disk encryption","Data loss prevention","Operating system hardening","Boot security"],"answer":0},{"q":"A company needs to keep the fewest records possible, meet compliance needs, and ensure destruction of records that are no longer needed. Which of the following best describes the policy that meets these requirements?","options":["Security policy","Classification policy","Retention policy","Access control policy"],"answer":2},{"q":"Which of the following is a common source of unintentional corporate credential leakage in cloud environments?","options":["Code repositories","Dark web","Threat feeds","State actors"],"answer":0},{"q":"Which of the following is the best reason an organization should enforce a data classification policy to help protect its most sensitive information?","options":["End users will be required to consider the classification of data that can be used in documents.","The policy will result in the creation of access levels for each level of classification.","The organization will have the ability to create security requirements based on classification levels.","Security analysts will be able to see the classification of data within a document before opening it."],"answer":2},{"q":"An analyst is performing a vulnerability scan against the web servers exposed to the internet without a system account. Which of the following is most likely being performed?","options":["Non-credentialed scan","Packet capture","Privilege escalation","System enumeration"],"answer":0},{"q":"A security administrator is hardening corporate systems and applying appropriate mitigations by consulting a real-world knowledge base for adversary behavior. Which of the following would be best for the administrator to reference?","options":["MITRE ATT&CK","CSIRT","CVSS","SOAR"],"answer":0},{"q":"An architect has a request to increase the speed of data transfer using JSON requests externally. Currently, the organization uses SFTP to transfer data files. Which of the following will most likely meet the requirements?","options":["A website-hosted solution","Cloud shared storage","A secure email solution","Microservices using API"],"answer":3},{"q":"Which of the following addresses individual rights such as the right to be informed, the right of access, and the right to be forgotten?","options":["GDPR","PCI DSS","NIST","ISO"],"answer":0},{"q":"Which of the following is the most important security concern when using legacy systems to provide production service?","options":["Instability","Lack of vendor support","Loss of availability","Use of insecure protocols"],"answer":1},{"q":"A security investigation revealed that malicious software was installed on a server using a server administrator's credentials. During the investigation, the server administrator explained that Telnet was regularly used to log in. Which of the following most likely occurred?","options":["A spraying attack was used to determine which credentials to use.","A packet capture tool was used to steal the password.","A remote-access Trojan was used to install the malware.","A dictionary attack was used to log in as the server administrator."],"answer":1},{"q":"A user is requesting Telnet access to manage a remote development web server. Insecure protocols are not allowed for use within any environment. Which of the following should be configured to allow remote access to this server?","options":["HTTPS","SNMPv3","SSH","RDP"],"answer":2},{"q":"A security administrator is working to find a cost-effective solution to implement certificates for a large number of domains and subdomains owned by the company. Which of the following types of certificates should the administrator implement?","options":["Wildcard","Client certificate","Self-signed","Code signing"],"answer":0},{"q":"An auditor discovered multiple insecure ports on some servers. Other servers were found to have legacy protocols enabled. Which of the following tools did the auditor use to discover these issues?","options":["Nessus","curl","Wireshark","netcat"],"answer":0},{"q":"A security analyst received a tip that sensitive proprietary information was leaked to the public. The analyst is reviewing the PCAP and notices traffic between an internal server and an external host that includes the following: ... 12:47:22.327233 PPPoE [ses 0x8122] IP (tos 0x0, ttl 64, id 0, offset 0, flags [DF], proto IPv6 (41), length 331) 10.5.1.1 > 52.165.16.154: IP6 (hlim E3, next-header TCP (6) paylcad length: 271) 2001:67c:2158:a019::ace.53104 > 2001:0:5ef5:79fd:380c:dddd:a601:24fa.13788: Flags [P.], cksum 0xd7ee (correct), seq 97:348, ack 102, win 16444, length 251 ... Which of the following was most likely used to exfiltrate the data?","options":["Encapsulation","MAC address spoofing","Steganography","Broken encryption"],"answer":0},{"q":"A company wants to reduce the time and expense associated with code deployment. Which of the following technologies should the company utilize?","options":["Serverless architecture","Thin clients","Private cloud","Virtual machines"],"answer":0},{"q":"A security administrator is performing an audit on a stand-alone UNIX server, and the following message is immediately displayed: (Error 13): /etc/shadow: Permission denied. Which of the following best describes the type of tool that is being used?","options":["Pass-the-hash monitor","File integrity monitor","Forensic analysis","Password cracker"],"answer":1},{"q":"A security administrator needs to create firewall rules for the following protocols: RTP, SIP, H.323. and SRTP. Which of the following does this rule set support?","options":["RTOS","VoIP","SoC","HVAC"],"answer":1},{"q":"Which of the following best describes a social engineering attack that uses a targeted electronic messaging campaign aimed at a Chief Executive Officer?","options":["Whaling","Spear phishing","Impersonation","Identity fraud"],"answer":0},{"q":"During a penetration test, a flaw in the internal PKI was exploited to gain domain administrator rights using specially crafted certificates. Which of the following remediation tasks should be completed as part of the cleanup phase?","options":["Updating the CRL","Patching the CA","Changing passwords","Implementing SOAR"],"answer":1},{"q":"A company wants to implement MFA. Which of the following enables the additional factor while using a smart card?","options":["PIN","Hardware token","User ID","SMS"],"answer":0},{"q":"A newly implemented wireless network is designed so that visitors can connect to the wireless network for business activities. The legal department is concerned that visitors might connect to the network and perform illicit activities. Which of me following should the security team implement to address this concern?","options":["Configure a RADIUS server to manage device authentication.","Use 802.1X on all devices connecting to wireless.","Add a guest captive portal requiring visitors to accept terms and conditions.","Allow for new devices to be connected via WPS."],"answer":2},{"q":"Which of the following data roles is responsible for identifying risks and appropriate access to data?","options":["Owner","Custodian","Steward","Controller"],"answer":0},{"q":"Which of the following physical controls can be used to both detect and deter? (Choose two.)","options":["Lighting","Fencing","Signage","Sensor"],"answer":0},{"q":"A multinational bank hosts several servers in its data center. These servers run a business-critical application used by customers to access their account information. Which of the following should the bank use to ensure accessibility during peak usage times?","options":["Load balancer","Cloud backups","Geographic dispersal","Disk multipathing"],"answer":0},{"q":"The author of a software package is concerned about bad actors repackaging and inserting malware into the software. The software download is hosted on a website, and the author exclusively controls the website's contents. Which of the following techniques would best ensure the software's integrity?","options":["Input validation","Code signing","Secure cookies","Fuzzing"],"answer":1},{"q":"A third-party vendor is moving a particular application to the end-of-life stage at the end of the current year. Which of the following is the most critical risk if the company chooses to continue running the application?","options":["Lack of security updates","Lack of new features","Lack of support","Lack of port account.","The attacker utilized living-off-the-land binaries to evade endpoint detection and response software.","The attacker socially engineered the accountant into performing bad transfers."],"answer":1},{"q":"Which of the following is the best resource to consult for information on the most common application exploitation methods?","options":["OWASP","STIX","OVAL","Threat intelligence feed"],"answer":0},{"q":"A security analyst is reviewing the logs on an organization's DNS server and notices the following unusual snippet: Which of the following attack techniques was most likely used?","options":["Determining the organization's ISP-assigned address space","Bypassing the organization's DNS sinkholing","Footprinting the internal network","Attempting to achieve initial access to the DNS server"],"answer":2},{"q":"A security analyst at an organization observed several user logins from outside the organization's network. The analyst determined that these logins were not performed by individuals within the organization. Which of the following recommendations would reduce the likelihood of future attacks? (Choose two.)","options":["Disciplinary actions for users","Conditional access policies","More regular account audits","Implementation of additional authentication factors"],"answer":1},{"q":"A security team is addressing a risk associated with the attack surface of the organization's web application over port 443. Currently, no advanced network security capabilities are in place. Which of the following would be best to set up? (Choose two.)","options":["NIDS","Honeypot","Certificate revocation list","HIPS"],"answer":0},{"q":"A systems administrator would like to create a point-in-time backup of a virtual machine. Which of the following should the administrator use?","options":["Replication","Simulation","Snapshot","Containerization"],"answer":2},{"q":"A security administrator notices numerous unused, non-compliant desktops are connected to the network. Which of the following actions would the administrator most likely recommend to the management team?","options":["Monitoring","Decommissioning","Patching","Isolating"],"answer":1},{"q":"Which of the following is a common data removal option for companies that want to wipe sensitive data from hard drives in a repeatable manner but allow the hard drives to be reused?","options":["Sanitization","Formatting","Degaussing","Defragmentation"],"answer":0},{"q":"An organization wants to improve the company's security authentication method for remote employees. Given the following requirements: \u2022 Must work across SaaS and internal network applications \u2022 Must be device manufacturer agnostic \u2022 Must have offline capabilities Which of the following would be the most appropriate authentication method?","options":["Username and password","Biometrics","SMS verification","Time-based tokens"],"answer":3},{"q":"A security officer is implementing a security awareness program and has placed security-themed posters around the building and assigned online user training. Which of the following will the security officer most likely implement?","options":["Password policy","Access badges","Phishing campaign","Risk assessment"],"answer":2},{"q":"A malicious update was distributed to a common software platform and disabled services at many organizations. Which of the following best describes this type of vulnerability?","options":["DDoS attack","Rogue employee","Insider threat","Supply chain"],"answer":3},{"q":"A company web server is initiating outbound traffic to a low-reputation, public IP on non-standard pat. The web server is used to present an unauthenticated page to clients who upload images the company. An analyst notices a suspicious process running on the server hat was not created by the company development team. Which of the following is the most likely explanation for his security incident?","options":["A web shell has been deployed to the server through the page.","A vulnerability has been exploited to deploy a worm to the server.","Malicious insiders are using the server to mine cryptocurrency.","Attackers have deployed a rootkit Trojan to the server over an exposed RDP port."],"answer":0},{"q":"An organization requests a third-party full-spectrum analysis of its supply chain. Which of the following would the analysis team use to meet this requirement?","options":["Vulnerability scanner","Penetration test","SCAP","Illumination tool"],"answer":3},{"q":"A systems administrator deployed a monitoring solution that does not require installation on the endpoints that the solution is monitoring. Which of the following is described in this scenario?","options":["Agentless solution","Client-based soon","Open port","File-based solution"],"answer":0},{"q":"A security analyst is reviewing the source code of an application in order to identify misconfigurations and vulnerabilities. Which of the following kinds of analysis best describes this review?","options":["Dynamic","Static","Gap","Impact"],"answer":1},{"q":"Which of the following agreement types is used to limit external discussions?","options":["BPA","NDA","SLA","MSA"],"answer":1},{"q":"A security analyst is evaluating a SaaS application that the human resources department would like to implement. The analyst requests a SOC 2 report from the SaaS vendor. Which of the following processes is the analyst most likely conducting?","options":["Internal audit","Penetration testing","Attestation","Due diligence"],"answer":3},{"q":"Which of the following is used to conceal credit card information in a database log file?","options":["Tokenization","Masking","Hashing","Obfuscation"],"answer":1},{"q":"An organization recently started hosting a new service that customers access through a web portal. A security engineer needs to add to the existing security devices a new solution to protect this new service. Which of the following is the engineer most likely to deploy?","options":["Layer 4 firewall","NGFW","WAF","UTM"],"answer":2},{"q":"Which of the following topics would most likely be included within an organization's SDLC?","options":["Service-level agreements","Information security policy","Penetration testing methodology","Branch protection requirements"],"answer":3},{"q":"Which of the following control types is AUP an example of?","options":["Physical","Managerial","Technical","Operational"],"answer":1},{"q":"An organization is adopting cloud services at a rapid pace and now has multiple SaaS applications in use. Each application has a separate log-in, so the security team wants to reduce the number of credentials each employee must maintain. Which of the following is the first step the security team should take?","options":["Enable SAML.","Create OAuth tokens.","Use password vaulting.","Select an IdP."],"answer":3},{"q":"A company's online shopping website became unusable shortly after midnight on January 30, 2023. When a security analyst reviewed the database server, the analyst noticed the following code used for backing up data: Which of the following should the analyst do next?","options":["Check for recently terminated DBAs.","Review WAF logs for evidence of command injection.","Scan the database server for malware.","Search the web server for ransomware notes."],"answer":1},{"q":"Which of the following would be the best way to test resiliency in the event of a primary power failure?","options":["Parallel processing","Tabletop exercise","Simulation testing","Production failover"],"answer":3},{"q":"Which of the following would be the most appropriate way to protect data in transit?","options":["SHA-256","SSL3.0","TLS 1.3","AES-256"],"answer":2},{"q":"Which of the following is a common, passive reconnaissance technique employed by penetration testers in the early phases of an engagement?","options":["Open-source intelligence","Port scanning","Pivoting","Exploit validation"],"answer":0},{"q":"Which of the following threat actors is the most likely to seek
